  - title: Java - 分布式锁实现
    category: Java
    description: 基于 Redis 的分布式锁实现示例
    code: |
      public class RedisDistributedLock {
          private final RedisTemplate<String, String> redisTemplate;
          
          public boolean tryLock(String key, String value, long expireTime) {
              return redisTemplate.opsForValue()
                  .setIfAbsent(key, value, expireTime, TimeUnit.SECONDS);
          }
          
          public void unlock(String key, String value) {
              String script = "if redis.call('get', KEYS[1]) == ARGV[1] " +
                              "then return redis.call('del', KEYS[1]) " +
                              "else return 0 end";
              redisTemplate.execute(
                  new DefaultRedisScript<>(script, Long.class),
                  Collections.singletonList(key),
                  value
              );
          }
      }
  
  - title: Go - 并发控制模式
    category: Go
    description: 使用 channel 控制并发任务
    code: |
      func concurrentWorker(tasks []Task, maxWorkers int) {
          sem := make(chan struct{}, maxWorkers)
          var wg sync.WaitGroup
          
          for _, task := range tasks {
              wg.Add(1)
              sem <- struct{}{}
              
              go func(t Task) {
                  defer wg.Done()
                  defer func() { <-sem }()
                  
                  processTask(t)
              }(task)
          }
          
          wg.Wait()
      }
  
  - title: Python - 数据处理管道
    category: Python
    description: 使用生成器实现数据处理管道
    code: |
      def data_pipeline(source):
          """数据处理管道示例"""
          # Step 1: 读取数据
          for item in read_data(source):
              # Step 2: 过滤无效数据
              if validate(item):
                  # Step 3: 转换格式
                  transformed = transform(item)
                  # Step 4: 输出结果
                  yield transformed
      
      def process_data(source):
          pipeline = data_pipeline(source)
          for data in pipeline:
              save_to_database(data)
  
